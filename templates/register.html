{% extends 'base.html' %}

{% block title %}Реєстрація{% endblock %}

{% block content %}
    <div class="container mt-5">
         <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3 class="card-title mb-0">Реєстрація</h3>
                    </div>
                    <div class="card-body">
                            <form method="post">
                                {% csrf_token %}
                                {% for field in form %}
                                    <div class="mb-3">
                                        <label class="form-label">{{ field.label }}</label>
                                        {{ field }}
                                        {% if field.errors %}
                                            <div class="text-danger small">
                                                {{ field.errors }}
                                            </div>
                                        {% endif %}
                                    </div>
                                {% endfor %}
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success">Зареєструватися</button>
                                </div>
                            </form>
                            <div class="mt-3 text-center">
                                <p>Вже маєте акаунт? <a href="{% url 'login' %}">Увійти</a></p>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
